<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGO Turtle — Royal 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; min-height: 100vh; }
        #shell-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top-color: #c9a227;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            max-width: 400px;
            background: rgba(255,107,107,0.1);
            border-radius: 12px;
        }
        #shell-frame {
            display: none;
            width: 100%; height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div id="shell-loader">
        <div class="spinner"></div>
        <div>Loading latest version…</div>
    </div>
    <iframe id="shell-frame" title="LOGO Turtle Royal 3D"></iframe>
    <script>
        const SOURCE = 'https://raw.githubusercontent.com/varunbiswasgit/aiacode/main/logo-turtle/logo-turtle-3d.html';
        const loader = document.getElementById('shell-loader');
        const frame  = document.getElementById('shell-frame');

        async function load() {
            try {
                const res = await fetch(`${SOURCE}?t=${Date.now()}`);
                if (!res.ok) throw new Error(`GitHub returned HTTP ${res.status}`);
                const html = await res.text();
                frame.style.display = 'block';
                loader.style.display = 'none';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(html); doc.close();
            } catch (err) {
                loader.innerHTML = `<div class="error"><p>❌ Failed to load from GitHub</p><p style="font-size:0.85rem;margin-top:8px;">${err.message}</p><p style="font-size:0.8rem;margin-top:8px;color:#aaa;">Try refreshing the page.</p></div>`;
            }
        }
        load();
    </script>
</body>
</html>
