<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris: Royal 3D Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; min-height: 100vh; }
        #shell-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            max-width: 400px;
            background: rgba(255,107,107,0.1);
            border-radius: 12px;
        }
        #shell-frame {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="shell-loader">
        <div class="spinner"></div>
        <div>Loading latest version…</div>
    </div>
    <iframe id="shell-frame" title="Tetris Royal 3D Edition"></iframe>
    <script>
        const SOURCE = 'https://raw.githubusercontent.com/varunbiswasgit/aiacode/main/tetris-game/tetris-royal-3d.html';
        const loader = document.getElementById('shell-loader');
        const frame  = document.getElementById('shell-frame');

        function showGame() {
            frame.style.display = 'block';
            loader.style.display = 'none';
        }

        function showError(msg) {
            loader.innerHTML = `<div class="error"><p>&#10060; Failed to load game</p><p style="font-size:0.85rem;margin-top:8px;">${msg}</p><p style="font-size:0.8rem;margin-top:8px;color:#aaa;">Try refreshing the page.</p></div>`;
        }

        // Timeout fallback — never hang forever
        const timeout = setTimeout(() => showError('Request timed out.'), 10000);

        frame.onload = function() {
            clearTimeout(timeout);
            showGame();
        };

        frame.onerror = function() {
            clearTimeout(timeout);
            showError('Could not reach GitHub.');
        };

        // Setting src triggers a native browser load — no CORS issues
        frame.src = SOURCE + '?t=' + Date.now();
    <\/script>
</body>
</html>
