<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris: Royal 3D Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0820; min-height: 100vh; overflow: hidden; }
        #shell-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .ls-dots { display: flex; gap: 8px; }
        .ls-dot {
            width: 14px; height: 14px; border-radius: 50%;
            animation: lsdot 1.2s ease-in-out infinite;
        }
        .ls-dot:nth-child(1) { background: #00f5ff; }
        .ls-dot:nth-child(2) { background: #bf00ff; animation-delay: .2s; }
        .ls-dot:nth-child(3) { background: #f5e083; animation-delay: .4s; }
        @keyframes lsdot {
            0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
            40%          { transform: scale(1.2); opacity: 1.0; }
        }
        #shell-status {
            font-size: 0.82rem;
            color: rgba(200,190,230,0.5);
            letter-spacing: 0.04em;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            max-width: 400px;
            background: rgba(255,107,107,0.1);
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.88rem;
        }
        #shell-frame {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="shell-loader">
        <div class="ls-dots">
            <div class="ls-dot"></div>
            <div class="ls-dot"></div>
            <div class="ls-dot"></div>
        </div>
        <div id="shell-status">Loading Tetris Royal&hellip;</div>
    </div>
    <iframe id="shell-frame" title="Tetris Royal 3D Edition"></iframe>
    <script>
        const SOURCE = 'https://raw.githubusercontent.com/varunbiswasgit/aiacode/main/tetris-game/tetris-royal-3d.html';
        const loader = document.getElementById('shell-loader');
        const status = document.getElementById('shell-status');
        const frame  = document.getElementById('shell-frame');

        function showError(msg) {
            loader.innerHTML = `<div class="error"><p>&#10060; Failed to load game</p><p style="margin-top:8px;">${msg}</p><p style="margin-top:8px;color:#aaa;font-size:0.8rem;">Tap / click to retry.</p></div>`;
            loader.style.cursor = 'pointer';
            loader.onclick = () => location.reload();
        }

        async function load() {
            try {
                status.textContent = 'Fetching latest version\u2026';
                const res = await fetch(SOURCE + '?t=' + Date.now());
                if (!res.ok) throw new Error('GitHub returned HTTP ' + res.status);
                status.textContent = 'Preparing game\u2026';
                const html = await res.text();
                const blob = new Blob([html], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                frame.onload = function() {
                    frame.style.display = 'block';
                    loader.style.display = 'none';
                };
                frame.src = blobUrl;
            } catch (err) {
                showError(err.message || 'Network error.');
            }
        }

        // 30s timeout to handle larger file
        const timeout = setTimeout(() => showError('Request timed out &#8212; check your connection.'), 30000);
        load().then(() => clearTimeout(timeout));
    <\/script>
</body>
</html>
