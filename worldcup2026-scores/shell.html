<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        #shell-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            color: #888;
        }
        #shell-loader .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #shell-loader .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            max-width: 400px;
            background: rgba(255,107,107,0.1);
            border-radius: 12px;
        }
        #shell-frame {
            display: none;
            width: 100%; height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div id="shell-loader">
        <div class="spinner"></div>
        <div>Loading latest version…</div>
    </div>
    <iframe id="shell-frame" title="FIFA World Cup 2026"></iframe>

    <script>
        // Source file in GitHub — only edit this URL to point at a different file
        const SOURCE = 'https://raw.githubusercontent.com/varunbiswasgit/aiacode/main/worldcup2026-scores/worldcup2026_scores.html';

        const loader = document.getElementById('shell-loader');
        const frame  = document.getElementById('shell-frame');

        async function loadFromGitHub() {
            try {
                // Cache-bust so CDN never serves a stale copy
                const res = await fetch(`${SOURCE}?t=${Date.now()}`);
                if (!res.ok) throw new Error(`GitHub returned HTTP ${res.status}`);
                const html = await res.text();

                // Write fetched HTML into the iframe
                frame.style.display = 'block';
                loader.style.display = 'none';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open();
                doc.write(html);
                doc.close();
            } catch (err) {
                loader.innerHTML = `
                    <div class="error">
                        <p>❌ Failed to load from GitHub</p>
                        <p style="font-size:0.85rem;margin-top:8px;">${err.message}</p>
                        <p style="font-size:0.8rem;margin-top:8px;color:#aaa;">Try refreshing the page.</p>
                    </div>`;
            }
        }

        loadFromGitHub();
    </script>
</body>
</html>
